<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      width: 360px;
      background: #07080f;
      color: #f1f5f9;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(135deg, rgba(99,102,241,0.08), transparent);
    }
    .header .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #fff;
      box-shadow: 0 0 12px rgba(99,102,241,0.4);
    }
    .header .title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .header .subtitle { font-size: 10px; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

    .body { padding: 16px 18px; }

    .url-display {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #64748b;
      word-break: break-all;
      line-height: 1.5;
      margin-bottom: 14px;
      max-height: 48px;
      overflow: hidden;
    }

    #checkBtn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 0 16px rgba(99,102,241,0.3);
      transition: opacity 0.15s;
    }
    #checkBtn:hover { opacity: 0.9; }
    #checkBtn:disabled { opacity: 0.4; cursor: wait; }

    .result-card {
      margin-top: 14px;
      border-radius: 10px;
      padding: 14px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .result-card.show { display: block; }
    .result-card.safe {
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.25);
    }
    .result-card.danger {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.25);
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .result-badge.safe {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #34d399;
    }
    .result-badge.danger {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
    }

    .risk-bar {
      background: #1e293b;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin: 8px 0 4px;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 2px;
    }
    .score-row .value { font-weight: 600; }

    .flags-section { margin-top: 10px; }
    .flag-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 6px 8px;
      background: rgba(239,68,68,0.05);
      border: 1px solid rgba(239,68,68,0.1);
      border-radius: 6px;
      font-size: 11px;
      color: #fca5a5;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .flag-icon { color: #ef4444; flex-shrink: 0; margin-top: 1px; }

    .risk-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }

    .error-msg {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">P</div>
    <div>
      <div class="title">PhishGuard AI</div>
      <div class="subtitle">Real-time Protection</div>
    </div>
  </div>

  <div class="body">
    <div class="url-display" id="urlDisplay">Loading current URL...</div>

    <button id="checkBtn">Scan This Website</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-card" id="resultCard">
      <div class="result-badge" id="resultBadge"></div>

      <div class="score-row">
        <span>Combined Risk</span>
        <span class="value" id="confidence"></span>
      </div>
      <div class="risk-bar">
        <div class="risk-bar-fill" id="riskBarFill"></div>
      </div>
      <div style="text-align: right; margin-bottom: 8px;">
        <span class="risk-label" id="riskLevel"></span>
      </div>

      <div class="score-row">
        <span>ML Score</span>
        <span class="value" id="mlScore"></span>
      </div>
      <div class="score-row">
        <span>Rule Score</span>
        <span class="value" id="ruleScore"></span>
      </div>

      <div class="flags-section" id="flagsSection"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
